services:
  db:
    image: postgres:16-alpine
    container_name: novelforge-db
    environment:
      POSTGRES_USER: novelforge
      POSTGRES_PASSWORD: novelforge
      POSTGRES_DB: novelforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    image: python:3.12-slim
    container_name: novelforge-backend
    working_dir: /app
    command: bash start.sh
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://novelforge:novelforge@novelforge-db:5432/novelforge
      - PORT=8001
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-placeholder}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - AI_MODEL=${AI_MODEL:-gpt-4o}
      - AI_TIMEOUT=${AI_TIMEOUT:-3000}
      - MOCK_AI=${MOCK_AI:-false}
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
      - python-venv:/app/.venv
    depends_on:
      - db

  frontend:
    image: node:22-alpine
    container_name: novelforge-frontend
    working_dir: /app
    command: sh start.sh
    environment:
      - PORT=5173
      - VITE_API_BASE_URL=http://localhost:8001
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - node-modules:/app/node_modules

volumes:
  python-venv:
  node-modules:
  pgdata:
